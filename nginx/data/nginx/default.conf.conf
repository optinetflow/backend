map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
    server_name "~^www\.(.*)$" ;
    return 301 $scheme://$1$request_uri ;
}

server {
    listen 8080;
    listen [::]:8080;
    server_tokens off;

    location /test {
        return 200 'test';
    }

    location /stub_status {
        stub_status;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name minio.${MAIN_DOMAIN};
    
    location / {
        proxy_pass  http://${MINIO_HOST}:9001;
        include conf.d/proxy.nginx.conf;

        # good for large uploads via proxy
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ~^grafana\..*$;
    
    location / {
        proxy_pass  http://grafana:3000;
        include conf.d/proxy.nginx.conf;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ~^metabase\..*$;
    
    location / {
        proxy_pass  http://metabase:3000;
        include conf.d/proxy.nginx.conf;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ~^prometheus\..*$;
    
    location / {
        proxy_pass  http://prometheus:9090;
        include conf.d/proxy.nginx.conf;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ~^.*$;

    location /file/ {
        proxy_pass  http://${MINIO_HOST}:9000/;
        include conf.d/proxy.nginx.conf;
    }

    location /api/ {
        proxy_pass  http://${BACKEND_HOST}:${BACKEND_PORT}/;
        include conf.d/proxy.nginx.conf;
    }

    location /flags/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    root /var/www/panel;
    index index.html;
    rewrite_log on;

    # Cache _next folder contents (static assets like JS, CSS, etc.)
    location /_next/ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
    }

    # Serve JavaScript, CSS, and other assets with long-term caching
    location ~* ^/_next/static/.*\.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|otf|svg|mp4|webm|avif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA / Next.js static export fallback (PRESERVE QUERY STRING!)
    # - If a real file exists, serve it; otherwise serve index.html with original query string.
    # - Using named location so query args are always preserved (no $uri/ redirect that can drop args).
    location / {
        try_files $uri $uri.html @next_fallback;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }
    location @next_fallback {
        # rewrite preserves query string by default, so ?country=fr etc. are kept on refresh
        rewrite ^ /index.html break;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header X-Request-URI $request_uri always;
    }

    # Enable Brotli Compression (if supported)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
}