version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  build-and-deploy:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout

      - run:
          name: Debug Environment Variables
          command: |
            echo "Checking environment variables..."
            echo "DB_PORT is set: $([[ ! -z $DB_PORT ]] && echo 'Yes' || echo 'No')"
            echo "POSTGRES_USER is set: $([[ ! -z $POSTGRES_USER ]] && echo 'Yes' || echo 'No')"
            echo "POSTGRES_PASSWORD is set: $([[ ! -z $POSTGRES_PASSWORD ]] && echo 'Yes' || echo 'No')"
            echo "POSTGRES_DB is set: $([[ ! -z $POSTGRES_DB ]] && echo 'Yes' || echo 'No')"
            echo "SERVER_USERNAME is set: $([[ ! -z $SERVER_USERNAME ]] && echo 'Yes' || echo 'No')"
            echo "SERVER_IP is set: $([[ ! -z $SERVER_IP ]] && echo 'Yes' || echo 'No')"
            echo "SERVER_PORT is set: $([[ ! -z $SERVER_PORT ]] && echo 'Yes' || echo 'No')"
            echo "DOCKERHUB_USERNAME is set: $([[ ! -z $DOCKERHUB_USERNAME ]] && echo 'Yes' || echo 'No')"
            echo "DOCKERHUB_TOKEN is set: $([[ ! -z $DOCKERHUB_TOKEN ]] && echo 'Yes' || echo 'No')"
            echo "PORT is set: $([[ ! -z $PORT ]] && echo 'Yes' || echo 'No')"
            echo "CONTAINER_NAME is set: $([[ ! -z $CONTAINER_NAME ]] && echo 'Yes' || echo 'No')"
            echo "NETWORK_NAME is set: $([[ ! -z $NETWORK_NAME ]] && echo 'Yes' || echo 'No')"
            echo "ENV_FILE is set: $([[ ! -z $ENV_FILE ]] && echo 'Yes' || echo 'No')"

      - add_ssh_keys:
          fingerprints:
            - "SHA256:4X9nkRG1kXfKre1B+w9dJhzMltIQni947mNoV+qyCpI"

      - run:
          name: Install pnpm
          command: npm install -g pnpm@8.6.11

      - run:
          name: Install Dependencies
          command: pnpm install

      - run:
          name: Generate Prisma Client
          command: pnpm prisma generate

      - run:
          name: Run Database Migrations
          command: |
            set -x  # start tracing commands
            export DB_PORT=5432
            export DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:1111/${POSTGRES_DB}
            echo "Running SSH with:"
            echo "ssh -fN -L 1111:localhost:${DB_PORT} -o StrictHostKeyChecking=no ${SERVER_USERNAME}@${SERVER_IP} -p ${SERVER_PORT}"
            ssh -fN -L 1111:localhost:${DB_PORT} -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP -p $SERVER_PORT 2>&1
            set +x  # stop tracing commands (optional)
            pnpm run migrate:deploy

      - run:
          name: Build and Push Docker Image
          command: |
            echo $DOCKERHUB_TOKEN | docker login --username $DOCKERHUB_USERNAME --password-stdin
            docker build --platform=linux/arm64 -t ${DOCKERHUB_USERNAME}/optinetflow:${CIRCLE_SHA1} -t ${DOCKERHUB_USERNAME}/optinetflow:latest --build-arg PORT=${PORT} .
            docker push ${DOCKERHUB_USERNAME}/optinetflow:${CIRCLE_SHA1}
            docker push ${DOCKERHUB_USERNAME}/optinetflow:latest
            docker logout
          environment:
            PORT: ${PORT}

      - run:
          name: Deploy to Server
          command: |
            echo "$ENV_FILE" > .env
            ssh -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP -p $SERVER_PORT "echo $DOCKERHUB_TOKEN | docker login --username $DOCKERHUB_USERNAME --password-stdin && mkdir -p $TEMP_ENV_PATH"
            ssh -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP -p $SERVER_PORT "docker pull ${DOCKERHUB_USERNAME}/optinetflow:${CIRCLE_SHA1}"
            ssh -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP -p $SERVER_PORT "docker container rm -f $CONTAINER_NAME || true"
            scp -o StrictHostKeyChecking=no -P $SERVER_PORT .env $SERVER_USERNAME@$SERVER_IP:$TEMP_ENV_PATH
            ssh -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP -p $SERVER_PORT "docker run -d --name $CONTAINER_NAME --env-file $TEMP_ENV_PATH/.env --network=${NETWORK_NAME} --restart always ${DOCKERHUB_USERNAME}/optinetflow:${CIRCLE_SHA1}"
            ssh -o StrictHostKeyChecking=no $SERVER_USERNAME@$SERVER_IP -p $SERVER_PORT "docker logout"
          environment:
            TEMP_ENV_PATH: /home/ubuntu/temp-backend-env
            CONTAINER_NAME: ${CONTAINER_NAME}
            NETWORK_NAME: ${NETWORK_NAME}

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build-and-deploy:
          filters:
            branches:
              only:
                - main
                - dev
