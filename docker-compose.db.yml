version: '3.7'
networks:
  default:
    external: true
    name: ${NETWORK_NAME}
services:
  postgres:
    image: postgres:15.3-alpine
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Enable trust authentication for localhost connections
      POSTGRES_HOST_AUTH_METHOD: trust
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c max_connections=100
      -c max_parallel_workers=4
      -c max_parallel_workers_per_gather=2
      -c random_page_cost=1.1
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c autovacuum=on
      -c autovacuum_naptime=1min
      -c autovacuum_max_workers=2
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
      -c statement_timeout=600000
      -c idle_in_transaction_session_timeout=300000
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=10
      -c default_statistics_target=100
      -c jit=off
      -c log_min_duration_statement=1000
      -c log_statement=none
      -c log_connections=on
      -c log_disconnections=on
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: ${PGBOUNCER_CONTAINER_NAME}
    restart: always
    environment:
       - DB_USER=${POSTGRES_USER}
       - DB_PASSWORD=${POSTGRES_PASSWORD}
       - DB_HOST=postgres
       - DB_NAME=${POSTGRES_DB}
       - POOL_MODE=transaction
       - MAX_CLIENT_CONN=200
       - DEFAULT_POOL_SIZE=50
       - RESERVE_POOL_SIZE=25
       - RESERVE_POOL_TIMEOUT=3
       - SERVER_LIFETIME=300
       - SERVER_IDLE_TIMEOUT=120
       - SERVER_CONNECT_TIMEOUT=5
       - SERVER_LOGIN_RETRY=3
       - QUERY_TIMEOUT=60
       - QUERY_WAIT_TIMEOUT=60
       - CLIENT_IDLE_TIMEOUT=60
       - CLIENT_LOGIN_TIMEOUT=60
    ports:
      - "127.0.0.1:${PGBOUNCER_PORT}:5432"
    depends_on:
      - postgres



volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      device: ${POSTGRES_DB_PERSIST_PATH}
      o: bind
