networks:
  default:
    external: true
    name: ${NETWORK_NAME}

services:
  metabase:
    build:
      context: .
      dockerfile: Dockerfile.metabase
    ports:
      - "${METABASE_PORT}:3000"
    volumes:
      - /dev/urandom:/dev/random:ro
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      metabase_db:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB_NAME}
      MB_DB_PORT: 7432
      MB_DB_HOST: metabase_db
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_AUTOMIGRATE: true
      MB_DB_CONNECTION_URI: "jdbc:postgresql://metabase_db:7432/${METABASE_DB_NAME}?currentSchema=public"
      MB_DB_CONNECTION_PROPERTIES: "user=${METABASE_DB_USER}&password=${METABASE_DB_PASSWORD}"
      MB_DB_CONNECTION_URI_OPTIONS: "sslmode=disable"
      
      

  
  metabase_db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - metabase-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${METABASE_DB_USER}
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD}
      POSTGRES_DB: ${METABASE_DB_NAME}
      LANG: en_US.utf8
      LC_ALL: en_US.utf8
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    command: >
      postgres
      -p 7432
      -c shared_buffers=512MB
      -c work_mem=32MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
      -c effective_cache_size=1GB
      -c statement_timeout=60000
      -c idle_in_transaction_session_timeout=60000
      -c client_encoding=UTF8
      -c timezone=UTC
    ports:
      - "127.0.0.1:${METABASE_DB_PORT}:7432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METABASE_DB_USER} -d ${METABASE_DB_NAME} -p 7432"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  metabase-data:
    driver: local
    driver_opts:
      type: none
      device: ${METABASE_DB_PERSIST_PATH}
      o: bind